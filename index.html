<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Erosion</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <button id="unity-play-button">&#9654;&nbsp;Play</button>
  <div id="sim-controls">
    <button id="btn-pause" class="sim-btn">Pause</button>
    <button id="btn-resume" class="sim-btn">Resume</button>
    <label class="sim-btn">
      Load New Terrain
      <input type="file" id="terrain-file" accept=".raw" style="display:none;">
    </label>
  </div>
  <div id="unity-warning"> </div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">Erosion</div>
  </div>
</div>
<style>
  #unity-play-button {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 56px;
    font-size: 24px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
  }
  #unity-play-button:hover {
    background: rgba(0, 0, 0, 0.85);
  }

  #sim-controls {
    display: none;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }
  .sim-btn {
    display: inline-block;
    padding: 8px 16px;
    margin-right: 6px;
    font-size: 14px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .sim-btn:hover {
    background: rgba(0, 0, 0, 0.85);
  }
</style>
<script>
  var canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
    }
    var div = document.createElement('div');
    div.innerHTML = msg;
    warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else {
      if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      setTimeout(function() {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }
    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Erosion_web.loader.js";
  var config = {
    arguments: [],
    dataUrl: buildUrl + "/Erosion_web.data",
    frameworkUrl: buildUrl + "/Erosion_web.framework.js",
    codeUrl: buildUrl + "/Erosion_web.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Erosion",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
    canvas.style.width = "960px";
    canvas.style.height = "600px";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var unityInstanceRef = null;
  var playButton = document.querySelector("#unity-play-button");
  var simControls = document.querySelector("#sim-controls");

  // ---- Play button: first start ----
  playButton.onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
    playButton.remove();
    simControls.style.display = "block";
  };

  // ---- Pause / Resume ----
  document.querySelector("#btn-pause").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StopSimulation");
  };

  document.querySelector("#btn-resume").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
  };

  // ---- Load New Terrain (.raw) ----
  document.querySelector("#terrain-file").onchange = (e) => {
    if (!unityInstanceRef) return;
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      // Convert the raw bytes to base64 so they survive the SendMessage
      // string bridge into Unity.
      const bytes = new Uint8Array(reader.result);
      let binary = "";
      const chunk = 0x8000; // build string in chunks to avoid stack limits
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      const base64 = btoa(binary);
      unityInstanceRef.SendMessage("SimulationController", "LoadTerrainRaw", base64);
    };
    reader.onerror = () => {
      unityShowBanner("Could not read the selected file.", "error");
    };
    reader.readAsArrayBuffer(file);
    e.target.value = ""; // allow re-selecting the same file later
  };

  // ---- Load Unity ----
  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      unityInstanceRef = unityInstance;
      document.querySelector("#unity-loading-bar").style.display = "none";
      playButton.style.display = "block";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);

</script>
</body>
</html>
