<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Erosion</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <button id="unity-play-button">&#9654;&nbsp;Play</button>

  <div id="sim-controls">
    <button id="btn-pause" class="sim-btn">Pause</button>
    <button id="btn-resume" class="sim-btn">Resume</button>
    <label class="sim-btn">
      Load New Terrain
      <input type="file" id="terrain-file" accept=".raw" style="display:none;">
    </label>
    <button id="btn-params" class="sim-btn">Parameters &#9662;</button>
  </div>
  <div id="berm-container">

    <canvas id="bermCanvas"></canvas>

  </div>
  <div id="param-panel">
    <div class="param-row">
      <label for="p-rainfall">Rainfall</label>
      <input type="range" id="p-rainfall" data-param="waterErosionRainfall"
             min="0" max="5" step="0.1" value="1">
      <span class="param-val" id="v-rainfall">1</span>
    </div>
    <div class="param-row">
      <label for="p-flowiter">Flow Iterations</label>
      <input type="range" id="p-flowiter" data-param="waterFlowIterations"
             min="1" max="1000" step="1" value="100">
      <span class="param-val" id="v-flowiter">100</span>
    </div>
    <div class="param-row">
      <label for="p-cone">Cone Threshold</label>
      <input type="range" id="p-cone" data-param="waterErosionConeThreshold"
             min="0.1" max="10" step="0.1" value="2">
      <span class="param-val" id="v-cone">2</span>
    </div>
    <div class="param-row">
      <label for="p-kd">Kd (deposition)</label>
      <input type="range" id="p-kd" data-param="Kd"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-kd">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-ks">Ks (erosion)</label>
      <input type="range" id="p-ks" data-param="Ks"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-ks">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-kc">Kc (capacity)</label>
      <input type="range" id="p-kc" data-param="Kc"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-kc">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-bermh">Berm Height (m)</label>
      <input type="range" id="p-bermh" data-param="bermHeightMeters"
             min="0" max="20" step="0.5" value="5">
      <span class="param-val" id="v-bermh">5</span>
    </div>
    <div class="param-row">
      <label for="p-bermr">Berm Radius</label>
      <input type="range" id="p-bermr" data-param="bermRadius"
             min="1" max="10" step="1" value="2">
      <span class="param-val" id="v-bermr">2</span>
    </div>
  </div>

  <div id="unity-warning"> </div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">Erosion</div>
  </div>
</div>
<style>
  #unity-play-button {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 56px;
    font-size: 24px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
  }
  #unity-play-button:hover {
    background: rgba(0, 0, 0, 0.85);
  }

  #sim-controls {
    display: none;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }
  .sim-btn {
    display: inline-block;
    padding: 8px 16px;
    margin-right: 6px;
    font-size: 14px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .sim-btn:hover {
    background: rgba(0, 0, 0, 0.85);
  }
  #berm-container
  {
    position:absolute;
    right:10px;
    top:50px;
    width:350px;
    height:250px;
    background:rgba(0,0,0,.7);
  }

  #bermCanvas
  {
    width:100%;
    height:100%;
    display:block;
  }
  #param-panel {
    display: none;
    position: absolute;
    top: 52px;
    left: 10px;
    z-index: 10;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid #fff;
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    width: 320px;
  }
  .param-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .param-row:last-child {
    margin-bottom: 0;
  }
  .param-row label {
    flex: 0 0 120px;
  }
  .param-row input[type="range"] {
    flex: 1 1 auto;
    margin: 0 8px;
  }
  .param-val {
    flex: 0 0 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>
<script>
  var canvas = document.querySelector("#unity-canvas");
  const bermCanvas = document.getElementById("bermCanvas");
  const bermCtx = bermCanvas.getContext("2d");

  let bermValues = [];
  let bermHeight = 5;
  let dragging = false;
  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
    }
    var div = document.createElement('div');
    div.innerHTML = msg;
    warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else {
      if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      setTimeout(function() {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }
    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Erosion_web.loader.js";
  var config = {
    arguments: [],
    dataUrl: buildUrl + "/Erosion_web.data",
    frameworkUrl: buildUrl + "/Erosion_web.framework.js",
    codeUrl: buildUrl + "/Erosion_web.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Erosion",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
    canvas.style.width = "960px";
    canvas.style.height = "600px";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var unityInstanceRef = null;
  var playButton = document.querySelector("#unity-play-button");
  var simControls = document.querySelector("#sim-controls");
  var paramPanel = document.querySelector("#param-panel");

  // ---- Play button: first start ----
  playButton.onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
    playButton.remove();
    simControls.style.display = "block";
  };

  // ---- Pause / Resume ----
  document.querySelector("#btn-pause").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StopSimulation");
  };

  document.querySelector("#btn-resume").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
  };

  // ---- Parameters panel toggle ----
  document.querySelector("#btn-params").onclick = () => {
    paramPanel.style.display =
            (paramPanel.style.display === "block") ? "none" : "block";
  };

  // ---- Realtime parameter sliders ----
  // Every slider carries a data-param attribute naming the variable.
  // On input we send "name=value" to Unity, which applies it immediately.
  document.querySelectorAll("#param-panel input[type='range']").forEach((slider) => {

    const valueLabel =
            slider.parentElement.querySelector(".param-val");


    slider.addEventListener("input", () => {

      valueLabel.textContent = slider.value;


      if (!unityInstanceRef)
        return;


      unityInstanceRef.SendMessage(
              "SimulationController",
              "SetParameter",
              slider.dataset.param + "=" + slider.value
      );


      // Update chart limits immediately
      if(slider.dataset.param == "bermHeightMeters")
      {
        if(bermChart)
        {
          let h = Number(slider.value);

          bermChart.options.scales.y.max = h;
          bermChart.options.scales.y.min = -h;

          bermChart.update("none");
        }
      }

    });

  });

  // ---- Load New Terrain (.raw) ----
  document.querySelector("#terrain-file").onchange = (e) => {
    if (!unityInstanceRef) return;
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      const bytes = new Uint8Array(reader.result);
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      const base64 = btoa(binary);
      unityInstanceRef.SendMessage("SimulationController", "LoadTerrainRaw", base64);
    };
    reader.onerror = () => {
      unityShowBanner("Could not read the selected file.", "error");
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  // ---- Load Unity ----
  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      unityInstanceRef = unityInstance;
      document.querySelector("#unity-loading-bar").style.display = "none";
      playButton.style.display = "block";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };
  function resizeBermCanvas()
  {
    bermCanvas.width = bermCanvas.clientWidth;
    bermCanvas.height = bermCanvas.clientHeight;

    drawBermProfile();
  }

  function drawBermProfile()
  {
    bermCtx.clearRect(
            0,
            0,
            bermCanvas.width,
            bermCanvas.height
    );

    const center = bermCanvas.height / 2;

    bermCtx.strokeStyle = "white";

    bermCtx.beginPath();
    bermCtx.moveTo(0, center);
    bermCtx.lineTo(bermCanvas.width, center);
    bermCtx.stroke();

    if(bermValues.length == 0)
      return;

    const width = bermCanvas.width / bermValues.length;

    bermCtx.fillStyle = "lime";

    for(let i=0;i<bermValues.length;i++)
    {
      const h =
              bermValues[i] /
              bermHeight *
              center;

      bermCtx.fillRect(
              i * width + 1,
              center - h,
              width - 2,
              h
      );
    }
  }

  window.addEventListener("resize", resizeBermCanvas);

  resizeBermCanvas();

  window.updateBermChart = function(data)
  {
    bermValues =
            data
                    .split(",")
                    .map(Number);

    drawBermProfile();
  }
  function getMouse(e)
  {
    const r = bermCanvas.getBoundingClientRect();

    return {
      x: e.clientX - r.left,
      y: e.clientY - r.top
    };
  }
  bermCanvas.onmousedown = function(e)
  {
    dragging = true;
  }
  window.onmouseup = function()
  {
    dragging = false;
  }
  bermCanvas.onmousemove = function(e)
  {
    if(!dragging)
      return;

    if(bermValues.length == 0)
      return;

    const m = getMouse(e);

    const width =
            bermCanvas.width /
            bermValues.length;

    const index =
            Math.floor(m.x / width);

    if(index < 0 || index >= bermValues.length)
      return;

    const value =
            (0.5 - m.y / bermCanvas.height)
            * 2
            * bermHeight;

    bermValues[index] = value;

    drawBermProfile();

    if(unityInstanceRef)
    {
      unityInstanceRef.SendMessage(
              "SimulationController",
              "SetBermProfile",
              bermValues.join(",")
      );
    }
  }
  document.body.appendChild(script);


  // =====================================================
  // BERM PROFILE CHART
  // =====================================================

  var bermChart = null;


  // Create the chart
  function createBermChart(size)
  {
    let ctx = document
            .getElementById("bermChart")
            .getContext("2d");


    bermChart = new Chart(ctx,
            {
              type: "bar",

              data:
                      {
                        labels: Array.from(
                                {length:size},
                                (_,i)=>i
                        ),

                        datasets:
                                [{
                                  label:"Berm Height (m)",
                                  data:Array(size).fill(0)
                                }]
                      },


              options:
                      {
                        responsive:true,
                        maintainAspectRatio:false,

                        scales:
                                {
                                  y:
                                          {
                                            min:-5,
                                            max:5
                                          }
                                },

                        plugins:
                                {
                                  legend:
                                          {
                                            display:true
                                          }
                                }
                      }
            });
  }



  // create a default chart immediately
  createBermChart(5);

</script>
</body>
</html>
