<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Erosion</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <button id="unity-play-button">&#9654;&nbsp;Play</button>

  <div id="sim-controls">
    <button id="btn-pause" class="sim-btn">Pause</button>
    <button id="btn-resume" class="sim-btn">Resume</button>
    <label class="sim-btn">
      Load New Terrain
      <input type="file" id="terrain-file" accept=".raw" style="display:none;">
    </label>
    <button id="btn-params" class="sim-btn">Parameters &#9662;</button>
  </div>

  <div id="param-panel">
    <div class="param-row">
      <label for="p-rainfall">Rainfall</label>
      <input type="range" id="p-rainfall" data-param="waterErosionRainfall"
             min="0" max="5" step="0.1" value="1">
      <span class="param-val" id="v-rainfall">1</span>
    </div>
    <div class="param-row">
      <label for="p-flowiter">Flow Iterations</label>
      <input type="range" id="p-flowiter" data-param="waterFlowIterations"
             min="1" max="1000" step="1" value="100">
      <span class="param-val" id="v-flowiter">100</span>
    </div>
    <div class="param-row">
      <label for="p-cone">Cone Threshold</label>
      <input type="range" id="p-cone" data-param="waterErosionConeThreshold"
             min="0.1" max="10" step="0.1" value="2">
      <span class="param-val" id="v-cone">2</span>
    </div>
    <div class="param-row">
      <label for="p-kd">Kd (deposition)</label>
      <input type="range" id="p-kd" data-param="Kd"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-kd">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-ks">Ks (erosion)</label>
      <input type="range" id="p-ks" data-param="Ks"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-ks">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-kc">Kc (capacity)</label>
      <input type="range" id="p-kc" data-param="Kc"
             min="0" max="0.1" step="0.001" value="0.01">
      <span class="param-val" id="v-kc">0.01</span>
    </div>
    <div class="param-row">
      <label for="p-bermh">Berm Height (m)</label>
      <input type="range" id="p-bermh" data-param="bermHeightMeters"
             min="0" max="20" step="0.5" value="5">
      <span class="param-val" id="v-bermh">5</span>
    </div>
    <div class="param-row">
      <label for="p-bermr">Berm Radius</label>
      <input type="range" id="p-bermr" data-param="bermRadius"
             min="1" max="10" step="1" value="2">
      <span class="param-val" id="v-bermr">2</span>
    </div>
  </div>

  <div id="unity-warning"> </div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">Erosion</div>
  </div>
</div>
<style>
  .param-divider {
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin: 10px 0;
  }
  .mini-btn {
    padding: 3px 10px;
    font-size: 12px;
    font-family: inherit;
    color: #fff;
    background: rgba(255,255,255,0.15);
    border: 1px solid #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .mini-btn:hover { background: rgba(255,255,255,0.3); }
  .berm-chart {
    display: block;
    width: 292px;
    height: 130px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 4px;
    touch-action: none;
    cursor: crosshair;
  }
  .berm-hint {
    margin-top: 6px;
    font-size: 11px;
    opacity: 0.7;
  }
  #unity-play-button {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 56px;
    font-size: 24px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
  }
  #unity-play-button:hover {
    background: rgba(0, 0, 0, 0.85);
  }

  #sim-controls {
    display: none;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }
  .sim-btn {
    display: inline-block;
    padding: 8px 16px;
    margin-right: 6px;
    font-size: 14px;
    font-family: inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .sim-btn:hover {
    background: rgba(0, 0, 0, 0.85);
  }

  #param-panel {

    display: none;
    position: absolute;
    top: 52px;
    left: 10px;
    z-index: 10;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid #fff;
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    width: 320px;
  }
  .param-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  <div class="param-divider"></div>
  <div class="param-row" style="justify-content:space-between;">
  <label style="flex:1 1 auto;">Berm Profile</label>
  <button id="btn-berm-reset" class="mini-btn">Reset</button>
  </div>
  <canvas id="berm-chart" class="berm-chart"></canvas>
  <div class="berm-hint">Drag inside the chart to shape the berm cross section</div>
  .param-row:last-child {
    margin-bottom: 0;
  }
  .param-row label {
    flex: 0 0 120px;
  }
  .param-row input[type="range"] {
    flex: 1 1 auto;
    margin: 0 8px;
  }
  .param-val {
    flex: 0 0 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>
<script>
  var canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
    }
    var div = document.createElement('div');
    div.innerHTML = msg;
    warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else {
      if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      setTimeout(function() {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }
    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Erosion_web.loader.js";
  var config = {
    arguments: [],
    dataUrl: buildUrl + "/Erosion_web.data",
    frameworkUrl: buildUrl + "/Erosion_web.framework.js",
    codeUrl: buildUrl + "/Erosion_web.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Erosion",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
    canvas.style.width = "960px";
    canvas.style.height = "600px";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var unityInstanceRef = null;
  var playButton = document.querySelector("#unity-play-button");
  var simControls = document.querySelector("#sim-controls");
  var paramPanel = document.querySelector("#param-panel");

  // ---- Play button: first start ----
  playButton.onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
    playButton.remove();
    simControls.style.display = "block";
  };

  // ---- Pause / Resume ----
  document.querySelector("#btn-pause").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StopSimulation");
  };

  document.querySelector("#btn-resume").onclick = () => {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "StartSimulation");
  };

  // ---- Parameters panel toggle ----
  document.querySelector("#btn-params").onclick = () => {
    paramPanel.style.display =
            (paramPanel.style.display === "block") ? "none" : "block";
  };

  // ---- Realtime parameter sliders ----
  // Every slider carries a data-param attribute naming the variable.
  // On input we send "name=value" to Unity, which applies it immediately.
  document.querySelectorAll("#param-panel input[type='range']").forEach((slider) => {
    const valueLabel = slider.parentElement.querySelector(".param-val");
    slider.addEventListener("input", () => {
      valueLabel.textContent = slider.value;
      if (!unityInstanceRef) return;
      unityInstanceRef.SendMessage(
              "SimulationController",
              "SetParameter",
              slider.dataset.param + "=" + slider.value
      );
    });
  });

  // ---- Load New Terrain (.raw) ----
  document.querySelector("#terrain-file").onchange = (e) => {
    if (!unityInstanceRef) return;
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      const bytes = new Uint8Array(reader.result);
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      const base64 = btoa(binary);
      unityInstanceRef.SendMessage("SimulationController", "LoadTerrainRaw", base64);
    };
    reader.onerror = () => {
      unityShowBanner("Could not read the selected file.", "error");
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };
  // ============================================================
  //  Berm profile bar chart
  //  bars = bermRadius*2+1, each bar ranges over +-bermHeightMeters
  //  Browser -> Unity : SimulationController.SetBermProfile (CSV)
  //  Unity -> browser : window.updateBermChart (from WebBridge.jslib)
  // ============================================================
  const BermChart = (function () {
    const LW = 292, LH = 130;                 // logical size, matches CSS
    const PAD_L = 30, PAD_R = 10, PAD_T = 12, PAD_B = 18;

    let canvas, ctx, dpr = 1;
    let radius = 2;                            // Unity default bermRadius
    let heightM = 5;                           // Unity default bermHeightMeters
    let profile = [];
    let dragging = false;
    let lastSent = "";
    let onEdit = null;

    function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
    function barCount() { return radius * 2 + 1; }
    function safeH() { return heightM < 0.0001 ? 0.0001 : heightM; }

    function plot() {
      const left = PAD_L, right = LW - PAD_R, top = PAD_T, bottom = LH - PAD_B;
      const w = right - left, h = bottom - top;
      return { left, right, top, bottom, w, h, zeroY: top + h / 2, halfH: h / 2 };
    }
    function valueToY(v) { const p = plot(); return p.zeroY - (v / safeH()) * p.halfH; }
    function yToValue(y) { const p = plot(); return clamp(((p.zeroY - y) / p.halfH) * safeH(), -heightM, heightM); }
    function xToIndex(x) { const p = plot(); const cw = p.w / barCount(); return clamp(Math.floor((x - p.left) / cw), 0, barCount() - 1); }

    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, LW, LH);
      const p = plot(), n = barCount(), cw = p.w / n;

      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.font = "10px sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      const hLbl = Math.round(heightM * 10) / 10;
      ctx.fillText("+" + hLbl, p.left - 4, p.top);
      ctx.fillText("0", p.left - 4, p.zeroY);
      ctx.fillText("-" + hLbl, p.left - 4, p.bottom);

      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = 1;
      [p.top, p.bottom].forEach(function (yy) {
        ctx.beginPath(); ctx.moveTo(p.left, yy); ctx.lineTo(p.right, yy); ctx.stroke();
      });
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath(); ctx.moveTo(p.left, p.zeroY); ctx.lineTo(p.right, p.zeroY); ctx.stroke();

      for (let i = 0; i < n; i++) {
        const v = profile[i] || 0;
        const x = p.left + i * cw + cw * 0.15;
        const bw = cw * 0.7;
        const yv = valueToY(v);
        const yTop = Math.min(yv, p.zeroY);
        const bh = Math.abs(yv - p.zeroY);
        ctx.fillStyle = v >= 0 ? "rgba(90,200,180,0.9)" : "rgba(220,140,90,0.9)";
        ctx.fillRect(x, yTop, bw, Math.max(bh, 0.5));
      }
    }

    function emit() {
      const csv = profile.map(function (v) { return Math.round(v * 1000) / 1000; }).join(",");
      if (csv === lastSent) return;
      lastSent = csv;
      if (typeof onEdit === "function") onEdit(csv);
    }

    function setAt(x, y) { profile[xToIndex(x)] = yToValue(y); draw(); emit(); }

    function pointerXY(e) {
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left) * (LW / r.width), y: (e.clientY - r.top) * (LH / r.height) };
    }

    function init(el, editCb) {
      canvas = el;
      onEdit = editCb;
      dpr = window.devicePixelRatio || 1;
      canvas.width = LW * dpr;
      canvas.height = LH * dpr;
      ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      if (profile.length !== barCount()) profile = new Array(barCount()).fill(0);

      canvas.addEventListener("pointerdown", function (e) {
        dragging = true; canvas.setPointerCapture(e.pointerId);
        const q = pointerXY(e); setAt(q.x, q.y);
      });
      canvas.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        const q = pointerXY(e); setAt(q.x, q.y);
      });
      canvas.addEventListener("pointerup", function () { dragging = false; });
      canvas.addEventListener("pointercancel", function () { dragging = false; });
      draw();
    }

    return {
      init: init,
      setRadius: function (r) {                 // visual mirror of InitializeBermProfile
        r = Math.max(1, Math.round(r));
        if (r === radius) return;
        radius = r;
        profile = new Array(barCount()).fill(0);
        lastSent = "";
        draw();
      },
      setHeight: function (hm) {                 // rescale axis, re-clamp, push clamped values
        heightM = hm;
        for (let i = 0; i < profile.length; i++) profile[i] = clamp(profile[i], -heightM, heightM);
        draw();
        emit();
      },
      setProfileFromCSV: function (csv) {        // pushed from Unity, do not echo
        if (dragging) return;
        const parts = csv.split(",").map(parseFloat).filter(function (v) { return !isNaN(v); });
        if (!parts.length) return;
        profile = parts.map(function (v) { return clamp(v, -heightM, heightM); });
        const impliedR = (profile.length - 1) / 2;
        if (Number.isInteger(impliedR) && impliedR >= 1) radius = impliedR;
        lastSent = profile.map(function (v) { return Math.round(v * 1000) / 1000; }).join(",");
        draw();
      },
      reset: function () { profile = new Array(barCount()).fill(0); draw(); emit(); }
    };
  })();

  function sendBermProfile(csv) {
    if (!unityInstanceRef) return;
    unityInstanceRef.SendMessage("SimulationController", "SetBermProfile", csv);
  }

  // Unity -> browser callback name must match WebBridge.jslib
  window.updateBermChart = function (csv) { BermChart.setProfileFromCSV(csv); };

  BermChart.init(document.querySelector("#berm-chart"), sendBermProfile);
  document.querySelector("#btn-berm-reset").onclick = function () { BermChart.reset(); };

  (function () {
    const rSlider = document.querySelector("#p-bermr");
    const hSlider = document.querySelector("#p-bermh");
    if (rSlider) rSlider.addEventListener("input", function () { BermChart.setRadius(parseFloat(rSlider.value)); });
    if (hSlider) hSlider.addEventListener("input", function () { BermChart.setHeight(parseFloat(hSlider.value)); });
  })();
  // ---- Load Unity ----
  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      unityInstanceRef = unityInstance;
      document.querySelector("#unity-loading-bar").style.display = "none";
      playButton.style.display = "block";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);

</script>
</body>
</html>
